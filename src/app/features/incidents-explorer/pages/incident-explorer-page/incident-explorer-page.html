<section class="page">
  <main class="layout">
    <section class="panel" aria-label="Active incidents list">
      <div class="panel-header">
        <h1>Active Incidents</h1>
      </div>
      <div class="incident-list">
        @for (incident of incidents(); track incident.title) {
          <app-incident-card
            variant="COMPACT"
            [incident]="incident"
          />
        }
      </div>
    </section>

    <aside
      #mapContainer
      class="map-panel"
      [class.mobile-open]="isMobileMapOpen()"
      aria-label="Map preview"
    >
      <button class="close-map-btn" type="button" (click)="closeMobileMap()" aria-label="Close map">
        Close
      </button>
    </aside>
  </main>

  <button
    class="open-map-btn"
    [class.is-hidden]="isMobileMapOpen()"
    type="button"
    (click)="openMobileMap()"
    aria-label="Open map"
  >
    View map
  </button>
</section>
