<section class="page">
  <main class="layout">
    <section class="panel" aria-label="Active incidents list">
      <div class="panel-header">
        <h1>Active Incidents</h1>
      </div>
      <div class="incident-list">
        @for (incident of incidents(); track incident.title) {
          <app-incident-card
            [incident]="incident"
          />
        }
      </div>
    </section>

    <aside class="map-panel" aria-label="Map preview">
    </aside>
  </main>
</section>
