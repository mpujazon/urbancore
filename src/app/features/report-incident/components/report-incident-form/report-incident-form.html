<article class="panel">
  <div class="section-title">
    <i class="icon fa-regular fa-file-lines"></i>
    <h2>Incident Details</h2>
  </div>

  <div class="field-stack">
    <label class="field">
      <span>Incident Title</span>
      <input type="text" placeholder="e.g. Broken streetlight on 5th Ave" required />
    </label>
    <label class="field">
      <span>Detailed Description</span>
      <textarea
        rows="5"
        placeholder="Describe the situation in detail. Include any identifying markers or specific hazards..."
      ></textarea>
    </label>
    <label class="field">
      <span>Category</span>
      <select aria-label="Category">
        @for (category of incidentCategories; track category) {
          <option [value]="category">{{ category | incidentCategoryLabel }}</option>
        }
      </select>
    </label>
  </div>
</article>
