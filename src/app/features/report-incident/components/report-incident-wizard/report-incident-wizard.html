<section class="form-layout" aria-label="Incident report form preview">
  <div class="primary-column">
    <app-report-incident-form
      (formValidityChanged)="updateFormValidityState($event)"
      (formValuesChanged)="updateFormValues($event)"
    />
    <app-report-incident-media (selectedFilesChanged)="updateSelectedFiles($event)" />
  </div>
  <aside class="side-column" aria-labelledby="location-title">
    <app-report-incident-location />
    <button class="submit-button" type="button" [disabled]="!canSubmit()" (click)="submitReport()">
      {{ isSubmitting() ? 'Submitting...' : 'Submit Report' }}
    </button>

    @if (submitError(); as error) {
      <p class="submit-feedback error" role="status" aria-live="polite">{{ error }}</p>
    }

    @if (submitSuccess(); as success) {
      <p class="submit-feedback success" role="status" aria-live="polite">{{ success }}</p>
    }
  </aside>
</section>
