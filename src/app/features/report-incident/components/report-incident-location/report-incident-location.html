<article class="panel location-panel">
  <div class="section-title">
    <i class="icon fa-solid fa-location-dot"></i>
    <h2 id="location-title">Location</h2>
  </div>

  <div class="map-card">
    <div #mapContainer class="map-canvas" role="application" aria-label="Incident location map"></div>

    <p class="map-hint">Click the map to select a location</p>

    <button
      class="locate-button"
      type="button"
      [disabled]="isLocating()"
      (pointerdown)="$event.stopPropagation()"
      (click)="locateMe($event)"
    >
      <i class="fa-solid fa-location-crosshairs"></i>
      {{ isLocating() ? 'Locating...' : 'Locate Me' }}
    </button>
  </div>

  @if (locationMessage()) {
    <p class="location-message" aria-live="polite">{{ locationMessage() }}</p>
  }

  <div class="location-fields">
    <label class="field coordinates-field">
      <span>Coordinates</span>
      <span class="input-with-icon">
        <input
          type="text"
          [value]="coordinates()"
          aria-label="Coordinates"
          placeholder="Select a location on the map"
          readonly
        />
      </span>
    </label>

    <div class="notice">
      <i class="icon fa-solid fa-circle-info"></i>
      <p>Your GPS coordinates will be automatically bundled with this report for precision dispatching.</p>
    </div>
  </div>
</article>
