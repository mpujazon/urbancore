<div class="user-card">
  <img [src]="imgUrl" alt="User Avatar">
  <div class="user-card__info">
    <div class="user_details">
      <p class="name">{{name}}</p>
      <p>{{role}}</p>
    </div>
    <p class="active_session"><i class="fa-solid fa-circle-dot"></i> Active Session</p>
  </div>
</div>
