<article class="incident-card">
  <div class="incident-media">
    <img [src]="incident().imageUrl" [alt]="incident().title"/>
    @if (variant() === 'DETAILED') {
      <app-status-pill
        class="status-pill--overlay"
        [statusName]="incident().status"
        [classStyle]="incident().statusStyleClass"
      />
    }
  </div>
  <div class="incident-content">
    <div class="incident-meta">
      <span><i [class]="`fa-solid ${incident().categoryIconClass}`" aria-hidden="true"></i> {{ incident().category }}</span>
      <span>{{ incident().date }}</span>
    </div>
    <h3>{{ incident().title }}</h3>
    <p>{{ incident().description }}</p>
    @if (variant() === 'COMPACT') {
      <app-status-pill
        class="status-pill--inline status-pill--compact"
        [statusName]="incident().status"
        [classStyle]="incident().statusStyleClass"
      />
    }
  </div>
</article>
